dataset:
  observation_fieldnames:
     - index
     - sentence
     - lemma_sentence
     - upos_sentence
     - xpos_sentence
     - morph
     - head_indices
     - governance_relations
     - secondary_relations
     - extra_info
     - embeddings
  corpus:
    root: /content/drive/MyDrive/5th Year/Winter Quarter, 2026/CS 224N/cs224n-structural-probe/data/es/UD_Spanish-AnCora/
    train_path: es_ancora-ud-train-11k.conllu
    dev_path: es_ancora-ud-dev.conllu
    test_path: es_ancora-ud-test.conllu
  embeddings:
    type: subword
    root: /content/embeddings/
    train_path: es_ancora-ud-train-11k.hdf5
    dev_path: es_ancora-ud-dev.hdf5
    test_path: es_ancora-ud-test.hdf5
  batch_size: 20
model:
  hidden_dim: 768
  model_type: BERT-disk
  use_disk: True
  model_layer: 7
probe:
  task_signature: word
  task_name: parse-depth
  maximum_rank: 64
  psd_parameters: True
  diagonal: False
  params_path: predictor.params
probe_training:
  epochs: 40
  loss: L1
reporting:
  root: /content/drive/MyDrive/5th Year/Winter Quarter, 2026/CS 224N/cs224n-structural-probe/results/es/es-ancora-prd-bert-base7/
  observation_paths:
    train_path: train.observations
    dev_path: dev.observations
    test_path: test.observations
  prediction_paths:
    train_path: train.predictions
    dev_path: dev.predictions
    test_path: test.predictions
  reporting_methods:
    - spearmanr
    - root_acc
    - image_examples